name: Bug
description: "Something is broken or behaving unexpectedly"
type: Bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Minor
        - Major
        - Critical
        - Blocker
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which platform module is affected? (optional — set during triage if not provided)
      options:
        - Certificates
        - Keys
        - Secrets
        - Entities
        - Discovery
        - Compliance
        - Protocols
        - Auth
        - Workflows
        - Core
        - CBOM
        - Signing
        - Connectors
        - Frontend
        - Infrastructure
        - SaaS
        - Agent
    validations:
      required: false
  - type: upload
    id: screenshot
    attributes:
      label: Screenshot
      description: Attach a screenshot showing the issue
    validations:
      required: false
      accept: ".png,.jpg,.jpeg,.gif"
  - type: upload
    id: logs
    attributes:
      label: Logs
      description: Relevant log files, error output, stack traces, or HTTP request/response
    validations:
      required: false
      accept: ".log,.txt,.zip,.gz,.csv,.json"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, browser, OS, deployment method
      placeholder: "ILM version: 2.x.x, Browser: Chrome 120, OS: Ubuntu 22.04"
