name: Test Docker image (reusable)

# Reusable workflow for OmniTrustILM PR test builds.
# Builds the image locally for each target architecture, scans it with Trivy,
# and fails on policy violations. Nothing is pushed.
#
# Optional pre-build:
#   - pre-build: 'maven'  -> runs `mvn clean package` once and shares the JARs
#                            with both per-arch builds via an `app-data.tar`
#                            artifact. Use this when the Dockerfile expects the
#                            JARs to already exist on disk.
#   - pre-build: 'none'   -> builds entirely inside the Dockerfile (default).

on:
  workflow_call:
    inputs:
      image:
        description: "Image repository path within the registry (e.g. ilm/core)"
        required: true
        type: string
      cache-scope:
        description: "Cache namespace shared by the per-arch builds (e.g. core)"
        required: true
        type: string
      registry:
        description: "Container registry hostname"
        required: false
        type: string
        default: hub.omnitrustregistry.com
      dockerfile:
        description: "Path to the Dockerfile (relative to repo root)"
        required: false
        type: string
        default: ./Dockerfile
      build-args:
        description: "Multiline build args passed to docker/build-push-action"
        required: false
        type: string
        default: ''
      pre-build:
        description: "Pre-build artifact strategy: 'none' or 'maven'"
        required: false
        type: string
        default: 'none'
      java-version:
        description: "JDK version (used when pre-build=maven)"
        required: false
        type: string
        default: '21'
      trivy-config:
        description: "Path to trivy config file (relative to repo root)"
        required: false
        type: string
        default: config/trivy.yaml

jobs:
  build_artifacts:
    name: Build app artifacts (once)
    if: ${{ inputs.pre-build == 'maven' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java + Maven cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Prepare data dir
        run: |
          rm -rf data
          mkdir -p data

      - name: Maven package
        run: mvn -f pom.xml -U -B -ntp -T 1C clean package

      - name: Collect artifacts into tar (preserve perms)
        run: |
          mkdir -p data/target
          cp -a target/*.jar data/target/
          cp -a docker data/docker
          tar -cpf app-data.tar data

      - name: Upload artifact (tar)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-data
          path: app-data.tar
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.arch }}
    needs: [build_artifacts]
    # Run even when build_artifacts is skipped (pre-build=none), but not when it fails.
    if: ${{ always() && (needs.build_artifacts.result == 'success' || needs.build_artifacts.result == 'skipped') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download artifact (tar)
        if: ${{ inputs.pre-build == 'maven' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-data

      - name: Extract artifacts (preserve perms)
        if: ${{ inputs.pre-build == 'maven' }}
        run: tar -xpf app-data.tar

      - name: Build (${{ matrix.arch }}) - local only (no push)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: ${{ inputs.registry }}/${{ inputs.image }}:ci
          cache-from: type=gha,scope=${{ inputs.cache-scope }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}-${{ matrix.arch }}
          build-args: ${{ inputs.build-args }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image }}:ci
          format: json
          output: trivy-report-${{ matrix.arch }}.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-${{ matrix.arch }}
          path: trivy-report-${{ matrix.arch }}.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image }}:ci
          trivy-config: ${{ inputs.trivy-config }}
          skip-setup-trivy: true
