name: Version and Module Propagation

# When a new issue is created, checks if it has a parent issue.
# If yes, copies Version and Module from parent to child — but only
# if the child's fields are empty. Never overrides existing values.
#
# This covers the main use case: sub-issues created under Epics.
# If an existing issue is linked as a sub-issue (not created new),
# this won't fire — the /project-triage skill's "Version mismatch"
# consistency rule catches those cases.
#
# Creation-time only: if the parent's Version/Module changes later,
# children are NOT auto-updated. The consistency rule flags drift.
#
# Authentication: GitHub App (ilm-project-bot)
# Trigger: new issue opened in any org repo

on:
  issues:
    types: [opened]

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Token is intentionally org-wide (no `repositories:` filter).
      # The parent issue may live in a different repo than the child
      # (e.g., an Epic in czertainly-core with sub-issues in
      # czertainly-frontend); scoping the token to the originating
      # repo would prevent reading the parent.
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.ILM_PROJECT_BOT_APP_ID }}
          private-key: ${{ secrets.ILM_PROJECT_BOT_PRIVATE_KEY }}
          owner: OmnitrustILM

      - name: Propagate fields from parent to child
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PROJECT_ID: PVT_kwDOB4ppKM4AlVOh
        run: .github/scripts/version-propagation/propagate-from-parent.sh
