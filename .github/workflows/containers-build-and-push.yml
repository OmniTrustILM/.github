name: Publish Harbor image (reusable)

# Reusable workflow for OmniTrustILM image publishes to a Harbor registry.
#
# Pattern:
#   1. (Optional) build_artifacts:  one-shot Maven build, shared via tar artifact.
#   2. build:                       per-arch build + push by digest only (no tags),
#                                   with provenance + SBOM + Trivy scan against the
#                                   pushed digest. Each run exports its digest as
#                                   a marker file.
#   3. publish_manifest:            collects all per-arch digests, creates the
#                                   multiarch manifest under each tag from
#                                   docker/metadata-action, signs every digest
#                                   and every tag with cosign, and pushes the
#                                   repo README to the registry.
#
# Adding a new architecture later means adding one entry to the matrix - the
# manifest job picks up any digests-* artifacts it finds.

on:
  workflow_call:
    inputs:
      image:
        description: "Image repository path within the registry (e.g. ilm/core)"
        required: true
        type: string
      cache-scope:
        description: "Cache namespace shared by the per-arch builds (e.g. core)"
        required: true
        type: string
      registry:
        description: "Container registry hostname"
        required: false
        type: string
        default: hub.omnitrustregistry.com
      registry-provider:
        description: "Provider for the README push action (harbor2, dockerhub, ...)"
        required: false
        type: string
        default: harbor2
      dockerfile:
        description: "Path to the Dockerfile (relative to repo root)"
        required: false
        type: string
        default: ./Dockerfile
      build-args:
        description: "Multiline build args passed to docker/build-push-action"
        required: false
        type: string
        default: ''
      pre-build:
        description: "Pre-build artifact strategy: 'none' or 'maven'"
        required: false
        type: string
        default: 'none'
      java-version:
        description: "JDK version (used when pre-build=maven)"
        required: false
        type: string
        default: '21'
      trivy-config:
        description: "Path to trivy config file (relative to repo root)"
        required: false
        type: string
        default: config/trivy.yaml
      tag-rules:
        description: |
          Multiline tag rules passed to docker/metadata-action. Default emits:
            - the tag name (for tag pushes)
            - {major}.{minor} and {major} (for semver tags)
            - 'latest' (for tag pushes)
            - 'develop-latest' + 'develop-<sha>' (for branch pushes)
          Override to customise per-repo.
        required: false
        type: string
        default: |
          type=ref,event=tag
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=develop-latest,enable=${{ startsWith(github.ref, 'refs/heads/') }}
          type=sha,prefix=develop-,format=long,enable=${{ startsWith(github.ref, 'refs/heads/') }}
    secrets:
      CONTAINER_REGISTRY_USERNAME:
        required: true
      CONTAINER_REGISTRY_PASSWORD:
        required: true
      COSIGN_PRIVATE_KEY:
        required: true
      COSIGN_PASSWORD:
        required: true

jobs:
  build_artifacts:
    name: Build app artifacts (once)
    if: ${{ inputs.pre-build == 'maven' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java + Maven cache
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Prepare data dir
        run: |
          rm -rf data
          mkdir -p data

      - name: Maven package (skip tests; tests run on PR)
        run: mvn -f pom.xml -U -B -ntp -T 1C -DskipTests clean package

      - name: Collect artifacts into tar (preserve perms)
        run: |
          mkdir -p data/target
          cp -a target/*.jar data/target/
          cp -a docker data/docker
          tar -cpf app-data.tar data

      - name: Upload artifact (tar)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-data
          path: app-data.tar
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build & push (${{ matrix.arch }})
    needs: [build_artifacts]
    if: ${{ always() && (needs.build_artifacts.result == 'success' || needs.build_artifacts.result == 'skipped') }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Download artifact (tar)
        if: ${{ inputs.pre-build == 'maven' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-data

      - name: Extract artifacts (preserve perms)
        if: ${{ inputs.pre-build == 'maven' }}
        run: tar -xpf app-data.tar

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Build + push (${{ matrix.arch }}) by digest only (no tags)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ inputs.registry }}/${{ inputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ inputs.cache-scope }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}-${{ matrix.arch }}
          build-args: ${{ inputs.build-args }}

      - name: Export digest as marker file
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy-report-${{ matrix.arch }}.json
          exit-code: 0

      - name: Upload vulnerability report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-report-${{ matrix.arch }}
          path: trivy-report-${{ matrix.arch }}.json

      - name: Fail build on vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        env:
          TRIVY_IMAGE_SRC: remote
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image }}@${{ steps.build.outputs.digest }}
          trivy-config: ${{ inputs.trivy-config }}
          skip-setup-trivy: true

  publish_manifest:
    name: Publish multiarch manifest
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    env:
      IMAGE: ${{ inputs.registry }}/${{ inputs.image }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download per-arch digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: ${{ inputs.tag-rules }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Create + push + sign multiarch manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "Per-arch digest files:"
          ls -1

          # Build the source list of per-arch image references and sign each.
          SOURCES=()
          for digest_file in *; do
            ref="${IMAGE}@sha256:${digest_file}"
            SOURCES+=("$ref")
            echo "Signing per-arch image: $ref"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$ref"
          done

          echo "Tags to publish:"
          echo "${TAGS}"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Publishing manifest: $tag"

            docker buildx imagetools create --tag "$tag" "${SOURCES[@]}"
            docker buildx imagetools inspect "$tag"

            echo "Signing multiarch manifest tag: $tag"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$tag"
          done <<< "${TAGS}"

      - name: Push README to registry
        uses: christian-korneck/update-container-description-action@d36005551adeaba9698d8d67a296bd16fa91f8e8 # v1
        env:
          DOCKER_USER: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          DOCKER_PASS: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
        with:
          destination_container_repo: ${{ env.IMAGE }}
          provider: ${{ inputs.registry-provider }}
