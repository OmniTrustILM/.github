name: ShellCheck

# Lints all bash scripts under .github/scripts/ on every PR and on
# pushes to main. Catches quoting, word-splitting, and other common
# shell bugs before they hit production workflows.

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .github/scripts
          severity: warning
