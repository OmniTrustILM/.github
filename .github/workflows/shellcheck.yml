name: ShellCheck

# Lints all bash scripts in the repo on every PR and on pushes to main.
# Covers both .github/scripts/ (used by workflows in this repo) and
# .github/actions/ (composite actions consumed by org repos).

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/actions/**"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/actions/**"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on scripts and actions
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .github
          severity: warning
