name: Label Sync

# Syncs standard labels from templates/labels.yml to all non-archived repos.
# - Labels in templates/labels.yml but missing in a repo → created
# - Labels in templates/labels.yml with different color/description → updated to match
# - Labels in a repo but NOT in templates/labels.yml → left untouched (not deleted)
#
# Authentication: GitHub App (ilm-project-bot)
# Trigger: push to templates/labels.yml on main, or manual dispatch

on:
  push:
    branches: [main]
    paths: [templates/labels.yml]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.ILM_PROJECT_BOT_APP_ID }}
          private-key: ${{ secrets.ILM_PROJECT_BOT_PRIVATE_KEY }}
          owner: OmniTrustILM

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.45.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Sync labels to all org repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: .github/scripts/label-sync/sync-labels.sh
