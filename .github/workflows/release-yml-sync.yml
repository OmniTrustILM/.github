name: Release.yml Sync

# Syncs templates/release.yml across all non-archived org repos via PRs.
# Manual trigger only. Uses matrix fan-out for parallel PR creation.
#
# Inputs:
#   target_repos: "all" or comma-separated list (e.g. "core,auth,frontend")
#   dry_run:      true = report diff only, no branch/PR; false = open PRs
#
# Self-exclusion: the .github repo itself is always skipped (self-reference).
# Per-repo opt-out: if a maintainer closes the sync PR without merging, the
# workflow respects that decision and won't reopen on later runs.
#
# Script logic lives in .github/scripts/release-yml-sync/ — this workflow
# just orchestrates checkouts, tokens, and matrix fan-out.

on:
  workflow_dispatch:
    inputs:
      target_repos:
        description: '"all" or comma-separated repo names (e.g. core,auth,frontend)'
        required: true
        default: "all"
        type: string
      dry_run:
        description: "Dry run: report what would change, open no PRs"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-yml-sync
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.resolve.outputs.repos }}
      count: ${{ steps.resolve.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.ILM_PROJECT_BOT_APP_ID }}
          private-key: ${{ secrets.ILM_PROJECT_BOT_PRIVATE_KEY }}
          owner: OmniTrustILM

      - name: Resolve target repos
        id: resolve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TARGET_INPUT: ${{ inputs.target_repos }}
        run: .github/scripts/release-yml-sync/resolve-targets.sh

  sync:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        repo: ${{ fromJSON(needs.plan.outputs.repos) }}
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.ILM_PROJECT_BOT_APP_ID }}
          private-key: ${{ secrets.ILM_PROJECT_BOT_PRIVATE_KEY }}
          owner: OmniTrustILM
          repositories: |
            ${{ matrix.repo }}

      - name: Checkout .github (source of truth + scripts)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: OmniTrustILM/${{ matrix.repo }}
          path: target
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1

      - name: Diff release.yml
        id: diff
        env:
          REPO_NAME: ${{ matrix.repo }}
        run: source/.github/scripts/release-yml-sync/diff-release.sh

      - name: Create/update sync branch and open PR
        if: ${{ !inputs.dry_run && steps.diff.outputs.status != 'IDENTICAL' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: OmniTrustILM/${{ matrix.repo }}
          REPO_NAME: ${{ matrix.repo }}
          STATUS: ${{ steps.diff.outputs.status }}
        run: source/.github/scripts/release-yml-sync/open-sync-pr.sh

  summary:
    needs: [plan, sync]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Run summary
        env:
          TARGET_COUNT: ${{ needs.plan.outputs.count }}
          DRY_RUN: ${{ inputs.dry_run }}
          SYNC_RESULT: ${{ needs.sync.result }}
        run: |
          {
            echo "## Release.yml Sync — Final Summary"
            echo ""
            echo "Target repos: $TARGET_COUNT"
            echo "Dry run: $DRY_RUN"
            echo "Sync job aggregate: $SYNC_RESULT"
            echo ""
            echo "_Note: with fail-fast disabled, individual repos may have succeeded even if aggregate is 'failure'. See per-repo sections above._"
          } >> "$GITHUB_STEP_SUMMARY"
